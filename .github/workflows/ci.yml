name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Building with Gradle
      run: ./gradlew build

    - name: SonarQube Analysis
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        ./gradlew sonar \
          -Dsonar.projectKey=my-java-app \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.qualitygate.wait=true

    - name: Generate SonarQube HTML Report
      if: always()
      run: |
        # Download using -L (follow redirects) and -o (output filename)
        # Using version 5.0.2 which is the latest stable release
        curl -L -o sonar-cnes-report.jar https://github.com
        
        # Verify the file is actually a JAR (ZIP) and not an HTML error page
        if ! zip -T sonar-cnes-report.jar; then
          echo "Downloaded file is corrupt or not a valid JAR."
          exit 1
        fi

        # Run report generation
        java -jar sonar-cnes-report.jar \
          -t ${{ secrets.SONAR_TOKEN }} \
          -s ${{ secrets.SONAR_HOST_URL }} \
          -p my-java-app \
          -o .
        
        # Clean up naming for the email attachment
        mv my-java-app-*.html sonarqube-report.html

    - name: Zip test reports
      if: always()
      run: |
        zip -r test-reports.zip build/reports/tests/ build/reports/jacoco/

    - name: Read test results
      if: always()
      id: test-results
      run: |
        TESTS=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "tests=" | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        FAILURES=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "failures=" | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        SKIPPED=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "skipped=" | grep -o 'skipped="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        echo "tests=$TESTS" >> $GITHUB_OUTPUT
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

    - name: Send email with report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "Build ${{ job.status }} — #${{ github.run_number }}"
        to: muhammad.tayyab@khaleef.com
        from: GitHub Actions
        convert_markdown: true
        attachments: sonarqube-report.html,test-reports.zip
        body: |
          ## Build Report
          **Status:** ${{ job.status }}
          **Tests:** ${{ steps.test-results.outputs.tests }} | **Failures:** ${{ steps.test-results.outputs.failures }}

          Please find the attached SonarQube HTML report and Test results zip.

    - name: Build and Push Docker Image
      if: success()
      uses: mr-smithers-excellent/docker-build-push@v4
      with:
        image: tayyab001/githubaction
        tag: latest
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
