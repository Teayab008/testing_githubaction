name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Building with Gradle
      run: ./gradlew build
      
   
    - name: SonarQube Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        ./gradlew sonar \
          -Dsonar.projectKey=my-java-app \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.qualitygate.wait=true
          
    - name: Zip test reports
      if: always()
      run: zip -r test-reports.zip build/reports/tests/

    - name: upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: test-reports.zip
        
    - name: Send email with report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "Build ${{ job.status }} — ${{ github.repository }} #${{ github.run_number }}"
        to: muhammad.tayyab@khaleef.com
        from: GitHub Actions
        body: |
          Build Status  : ${{ job.status }}
          Repository    : ${{ github.repository }}
          Branch        : ${{ github.ref_name }}
          Commit        : ${{ github.sha }}
          Triggered by  : ${{ github.actor }}

          SonarQube Report:
          ${{ secrets.SONAR_HOST_URL }}/dashboard?id=my-java-app

          Full Logs:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        

    - name: Build and Push Docker Image
      uses: mr-smithers-excellent/docker-build-push@v4
      with:
        image: tayyab001/githubaction
        tag: latest
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_PASSWORD }}
        port: ${{ secrets.DEPLOY_PORT }}
        script: |
          docker pull tayyab001/githubaction:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d \
            --name myapp \
            --restart always \
            -p 8080:8080 \
            tayyab001/githubaction:latest
