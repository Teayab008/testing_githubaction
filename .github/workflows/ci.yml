name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Building with Gradle
      run: ./gradlew build

    - name: SonarQube Analysis
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        ./gradlew sonar \
          -Dsonar.projectKey=my-java-app \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.qualitygate.wait=true

    - name: Generate SonarQube HTML Report
      if: always()
      run: |
        # Wget handles GitHub redirects much better than curl
        wget -O sonar-cnes-report.jar https://github.com
        
        # Run report generation
        java -jar sonar-cnes-report.jar \
          -t ${{ secrets.SONAR_TOKEN }} \
          -s ${{ secrets.SONAR_HOST_URL }} \
          -p my-java-app \
          -o .
        
        # Rename to a fixed name
        mv my-java-app-*.html sonarqube-report.html

    - name: Read test results
      if: always()
      id: test-results
      run: |
        TESTS=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "tests=" | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        FAILURES=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "failures=" | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        SKIPPED=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "skipped=" | grep -o 'skipped="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        echo "tests=$TESTS" >> $GITHUB_OUTPUT
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

    - name: Zip All Reports
      if: always()
      run: |
        # Zipping the HTML report avoids Gmail's security block on .html files
        zip -r final-report.zip \
          sonarqube-report.html \
          build/reports/tests/ \
          build/reports/jacoco/

    - name: Send email with report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "Build ${{ job.status }} — #${{ github.run_number }}"
        to: muhammad.tayyab@khaleef.com
        from: GitHub Actions
        convert_markdown: true
        # Attach the ZIP containing everything
        attachments: final-report.zip
        body: |
          ## Build Report Summary
          
          - **Status:** ${{ job.status }}
          - **Total Tests:** ${{ steps.test-results.outputs.tests }}
          - **Failures:** ${{ steps.test-results.outputs.failures }}
          
          **Note:** The SonarQube HTML report and unit test results are inside the attached `final-report.zip`.
          
          [View SonarQube Dashboard](${{ secrets.SONAR_HOST_URL }}/dashboard?id=my-java-app)

    - name: Build and Push Docker Image
      if: success()
      uses: mr-smithers-excellent/docker-build-push@v4
      with:
        image: tayyab001/githubaction
        tag: latest
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Deploy to server
      if: success()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_PASSWORD }}
        port: ${{ secrets.DEPLOY_PORT }}
        script: |
          docker pull tayyab001/githubaction:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d \
            --name myapp \
            --restart always \
            -p 8080:8080 \
            tayyab001/githubaction:latest
