name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Building with Gradle
      run: ./gradlew build

    - name: SonarQube Analysis
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        ./gradlew sonar \
          -Dsonar.projectKey=my-java-app \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.qualitygate.wait=true

    - name: Generate SonarQube Markdown Report
      if: always()
      run: |
        # Fixed Download: Using -L to follow redirects to the actual 42MB asset
        curl -L -o sonar-cnes-report.jar https://github.com
        
        # Verify file size (should be ~42MB, not 555KB)
        ls -lh sonar-cnes-report.jar
        
        # Generate Markdown (-m) instead of HTML to avoid Gmail security blocks
        java -jar sonar-cnes-report.jar \
          -t ${{ secrets.SONAR_TOKEN }} \
          -s ${{ secrets.SONAR_HOST_URL }} \
          -p my-java-app \
          -m \
          -o .
        
        # Rename the markdown file for the email step
        mv my-java-app-*.md sonar-report.md

    - name: Read test results
      if: always()
      id: test-results
      run: |
        TESTS=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "tests=" | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        FAILURES=$(find build/reports/tests/test -name "*.xml" | xargs grep -h "failures=" | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
        echo "tests=$TESTS" >> $GITHUB_OUTPUT
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT
        # Load the Sonar Markdown report content into an environment variable
        echo "SONAR_SUMMARY<<EOF" >> $GITHUB_ENV
        cat sonar-report.md >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Send email with report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "Build ${{ job.status }} — #${{ github.run_number }}"
        to: muhammad.tayyab@khaleef.com
        from: GitHub Actions
        convert_markdown: true
        body: |
          # Build & Sonar Report Summary
          
          **Status:** ${{ job.status }}
          **Total Tests:** ${{ steps.test-results.outputs.tests }}
          **Failures:** ${{ steps.test-results.outputs.failures }}
          
          ---
          ${{ env.SONAR_SUMMARY }}
          ---
          
          [View Full SonarQube Dashboard](${{ secrets.SONAR_HOST_URL }}/dashboard?id=my-java-app)

    - name: Build and Push Docker Image
      if: success()
      uses: mr-smithers-excellent/docker-build-push@v4
      with:
        image: tayyab001/githubaction
        tag: latest
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
